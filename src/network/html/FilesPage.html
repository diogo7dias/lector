<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Files — Lector</title>
<style>
  /* ===== Ledger theme: monochrome, dense table. Mostly white; dark = reverse ===== */
  :root{
    --bg:#fff; --panel:#fff; --alt:#f4f4f4; --ink:#111; --dim:#666; --faint:#8c8c8c;
    --line:#dcdcdc; --hair:#ececec; --fill:#111; --fillink:#fff; --sel:#eee; --danger:#8a1c1c;
    --sans:-apple-system,system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  :root[data-theme="dark"]{
    --bg:#0a0a0a; --panel:#111; --alt:#161616; --ink:#f2f2f2; --dim:#a6a6a6; --faint:#7a7a7a;
    --line:#2a2a2a; --hair:#1c1c1c; --fill:#f2f2f2; --fillink:#0a0a0a; --sel:#1e1e1e; --danger:#e0745f;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.35;-webkit-font-smoothing:antialiased;padding:0 8px 40px}
  .app{max-width:820px;margin:0 auto}
  a{color:inherit;text-decoration:none}
  .tnum{font-variant-numeric:tabular-nums}
  input[type="checkbox"]{accent-color:var(--ink);width:15px;height:15px;vertical-align:middle}
  [hidden]{display:none!important}
  button{font-family:inherit}

  .topbar{display:flex;align-items:baseline;gap:10px;border-bottom:2px solid var(--ink);padding:10px 2px 6px}
  .brand{font-weight:800;letter-spacing:.04em;font-size:16px}
  .brand span{font-weight:400;color:var(--dim);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-left:6px}
  .status{margin-left:auto;display:flex;gap:6px;align-items:center}
  .chip{border:1px solid var(--line);padding:1px 7px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
  .tgl{border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:11px;font-weight:700;padding:3px 8px;cursor:pointer}

  .tabs{display:flex;border-bottom:1px solid var(--line);margin-top:8px}
  .tabs a{border-right:1px solid var(--line);color:var(--dim);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 14px}
  .tabs a.on{background:var(--fill);color:var(--fillink)}

  .crumbar{display:flex;align-items:center;gap:6px;padding:8px 2px;border-bottom:1px solid var(--hair);font-size:12px;color:var(--dim);flex-wrap:wrap}
  .crumbar a:hover{color:var(--ink);text-decoration:underline}
  .crumbar b{color:var(--ink)}
  .crumbar .sp{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap}
  .kbtn{border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:12px;padding:4px 9px;cursor:pointer;white-space:nowrap}
  .kbtn:hover{border-color:var(--ink)}
  .kbtn.solid{background:var(--fill);color:var(--fillink);border-color:var(--fill)}
  .kbtn.danger{border-color:var(--danger);color:var(--danger)}
  .kbtn:disabled{opacity:.45;cursor:default}
  .kbtn.sm{padding:2px 6px;font-size:11px}

  .selbar{display:flex;align-items:center;gap:8px;padding:7px 8px;border-bottom:1px solid var(--line);background:var(--alt)}
  .selbar .n{font-weight:700}
  .selbar .sp{margin-left:auto;display:flex;gap:5px}

  table{width:100%;border-collapse:collapse}
  thead th{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);text-align:left;font-weight:700;padding:6px 8px;border-bottom:1px solid var(--line)}
  th.r,td.r{text-align:right}
  th.c,td.c{text-align:center;width:1%}
  tbody td{padding:5px 8px;border-bottom:1px solid var(--hair);font-size:12.5px;white-space:nowrap}
  tbody tr:hover{background:var(--alt)}
  tbody tr.sel{background:var(--sel);box-shadow:inset 3px 0 0 var(--ink)}
  td.nm{width:99%;max-width:0;overflow:hidden;text-overflow:ellipsis}
  td.nm a{cursor:pointer}
  td.k,td.sz,td.rd{color:var(--dim);font-size:11.5px}
  td.sz,td.rd{font-variant-numeric:tabular-nums;width:1%}
  td.k{width:1%}
  .fold{font-weight:700}
  .fold .tri{color:var(--faint);margin-right:5px;font-size:10px}
  .fav{color:var(--ink);font-weight:700;margin-left:6px}
  .acts{white-space:nowrap;width:1%}
  .acts button{border:1px solid transparent;background:transparent;color:var(--faint);font-size:12px;padding:2px 5px;cursor:pointer;line-height:1}
  .acts button:hover{border-color:var(--line);color:var(--ink)}
  tfoot td{padding:8px;color:var(--faint);font-size:11px;border-top:1px solid var(--line)}
  .empty{padding:22px;text-align:center;color:var(--faint)}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
  .scrim.on{display:flex}
  .modal{background:var(--panel);color:var(--ink);border:1px solid var(--ink);width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .modal h3{margin:0;font-size:13px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:11px 13px;border-bottom:1px solid var(--line);background:var(--fill);color:var(--fillink)}
  .modal .body{padding:13px}
  .modal .body p{margin:0 0 8px}
  .modal label{display:block;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:6px 0 3px}
  .modal input{width:100%;font:inherit;font-size:14px;padding:9px 10px;border:1px solid var(--ink);background:var(--alt);color:var(--ink);outline:none}
  .modal .act{display:flex;gap:7px;padding:11px 13px;border-top:1px solid var(--line)}
  .modal .act .sp{margin-left:auto}
  .picklist{max-height:190px;overflow:auto;border:1px solid var(--line);margin-top:6px}
  .picklist button{display:block;width:100%;text-align:left;border:0;border-bottom:1px solid var(--hair);background:var(--panel);color:var(--ink);font:inherit;font-size:12.5px;padding:7px 9px;cursor:pointer}
  .picklist button:hover,.picklist button.on{background:var(--sel)}
  .warn{border:1px solid var(--danger);padding:9px 11px;font-size:12.5px;color:var(--ink)}
  .warn b{color:var(--danger)}

  /* upload list */
  .uprow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--hair)}
  .uprow .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12.5px}
  .uprow .st{font-size:11px;color:var(--dim);width:70px;text-align:right;font-variant-numeric:tabular-nums}
  .bar{height:5px;background:var(--line);margin-top:4px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--ink);width:0}
  .drop{border:1px dashed var(--line);padding:18px;text-align:center;color:var(--dim);font-size:12.5px;cursor:pointer;margin-bottom:10px}
  .drop.hot{border-color:var(--ink);background:var(--alt);color:var(--ink)}
  .msg{font-size:12px;min-height:16px;margin-top:6px}
  .msg.err{color:var(--danger)}
  .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--fill);color:var(--fillink);font-size:12px;padding:8px 14px;z-index:60;opacity:0;transition:opacity .2s}
  .toast.on{opacity:1}
</style>
</head>
<body>
<script src="/js/cpauth.js"></script>
<div class="app">
  <div class="topbar">
    <div class="brand">LECTOR<span>library over wifi</span></div>
    <div class="status">
      <span class="chip">Unlocked</span>
      <span class="chip" id="devChip">…</span>
      <button class="tgl" id="tgl" title="Light / dark">◐</button>
    </div>
  </div>
  <div class="tabs">
    <a class="on" href="/files">Files</a>
    <a href="/opds">OPDS</a>
    <a href="/settings">Settings</a>
    <a href="/fonts">Fonts</a>
    <a href="https://diogo7dias.github.io/lector-xteink-firmware/" target="_blank" rel="noopener">Converter</a>
  </div>

  <div class="crumbar" id="crumbar"></div>

  <div class="selbar" id="selbar" hidden>
    <span class="n" id="selCount">0 selected</span>
    <span class="sp">
      <button class="kbtn sm" onclick="openMove()">Move</button>
      <button class="kbtn sm" onclick="downloadSelected()">Download</button>
      <button class="kbtn sm danger" onclick="openDelete()">Delete</button>
      <button class="kbtn sm" onclick="clearSel()">Deselect</button>
    </span>
  </div>

  <table>
    <thead><tr>
      <th class="c"><input type="checkbox" id="all" onclick="toggleAll(this)"></th>
      <th>Name</th><th class="k">Kind</th><th class="r">Size</th><th class="c">·</th>
    </tr></thead>
    <tbody id="rows"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
    <tfoot><tr><td colspan="5" id="foot"></td></tr></tfoot>
  </table>
</div>

<!-- ===== Modals ===== -->
<div class="scrim" id="m-folder"><div class="modal">
  <h3>New folder</h3>
  <div class="body"><label>Name</label><input id="folderName" maxlength="64" placeholder="Poetry"><div class="msg err" id="folderMsg"></div></div>
  <div class="act"><span class="sp"></span><button class="kbtn" onclick="closeM('m-folder')">Cancel</button><button class="kbtn solid" onclick="createFolder()">Create</button></div>
</div></div>

<div class="scrim" id="m-rename"><div class="modal">
  <h3 id="renameTitle">Rename</h3>
  <div class="body"><label>New name</label><input id="renameName" maxlength="128"><div class="msg err" id="renameMsg"></div></div>
  <div class="act"><span class="sp"></span><button class="kbtn" onclick="closeM('m-rename')">Cancel</button><button class="kbtn solid" onclick="confirmRename()">Rename</button></div>
</div></div>

<div class="scrim" id="m-move"><div class="modal">
  <h3 id="moveTitle">Move</h3>
  <div class="body">
    <label>Destination folder</label>
    <input id="moveDest" placeholder="/Books">
    <div class="picklist" id="movePicks"></div>
    <div class="msg err" id="moveMsg"></div>
  </div>
  <div class="act"><span class="sp"></span><button class="kbtn" onclick="closeM('m-move')">Cancel</button><button class="kbtn solid" onclick="confirmMove()">Move here</button></div>
</div></div>

<div class="scrim" id="m-delete"><div class="modal">
  <h3>Delete?</h3>
  <div class="body"><div class="warn" id="deleteWarn"></div><div class="msg err" id="deleteMsg"></div></div>
  <div class="act"><span class="sp"></span><button class="kbtn" onclick="closeM('m-delete')">Keep</button><button class="kbtn solid danger" id="deleteGo" onclick="confirmDelete()">Delete</button></div>
</div></div>

<div class="scrim" id="m-fav"><div class="modal">
  <h3>Move favorites</h3>
  <div class="body"><p id="favInfo"></p><label>Destination</label><input id="favDest" value="/sleep"><div class="msg" id="favMsg"></div></div>
  <div class="act"><span class="sp"></span><button class="kbtn" onclick="closeM('m-fav')">Cancel</button><button class="kbtn solid" id="favGo" onclick="confirmMoveFavorites()">Move</button></div>
</div></div>

<div class="scrim" id="m-upload"><div class="modal" style="max-width:440px">
  <h3>Upload to <span id="upPath" style="text-transform:none;letter-spacing:0"></span></h3>
  <div class="body">
    <div class="drop" id="drop">Drop files here, or tap to choose. Multiple files ok.</div>
    <input type="file" id="fileIn" multiple hidden>
    <div id="upList"></div>
    <div class="msg" id="upMsg"></div>
  </div>
  <div class="act"><span class="sp"></span><button class="kbtn" id="upClose" onclick="closeUpload()">Close</button><button class="kbtn solid" id="upGo" onclick="startUpload()" disabled>Upload</button></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
/* ---------------- state ---------------- */
var params = new URLSearchParams(location.search);
var currentPath = params.get('path') || '/';
if (currentPath[0] !== '/') currentPath = '/' + currentPath;
var entries = [];                 // {name,size,isDirectory,isEpub}
var moveCtx = null;               // {paths:[], single:bool, name}
var deleteCtx = null;             // {paths:[], label}
var WS_PORT = 81, WS_CHUNK_SIZE = 4096;
var currentUploadWs = null, currentUploadXhr = null;
var uploadQueue = [], uploadBusy = false, uploadGen = 0;

/* ---------------- helpers ---------------- */
function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function joinPath(dir,name){ return dir === '/' ? '/'+name : dir+'/'+name; }
function parentOf(p){ if(p==='/'||p==='')return '/'; var i=p.lastIndexOf('/'); return i<=0?'/':p.substring(0,i); }
function fmtSize(b){ if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(b<10240?1:0)+' KB'; if(b<1073741824)return (b/1048576).toFixed(1)+' MB'; return (b/1073741824).toFixed(2)+' GB'; }
function ext(n){ var i=n.lastIndexOf('.'); return i<0?'':n.substring(i+1).toUpperCase(); }
// Favorite wallpaper: exact "_F" (case-sensitive) before a .pxc/.bmp extension
// (extension case-insensitive) — mirrors firmware FavoriteImage::hasFavoriteSuffix.
function favMatch(n){ var m=n.match(/(_F)\.([A-Za-z]+)$/); return !!m && m[1]==='_F' && /^(pxc|bmp)$/i.test(m[2]); }
function openM(id){ document.getElementById(id).classList.add('on'); }
function closeM(id){ document.getElementById(id).classList.remove('on'); }
function toast(t){ var e=document.getElementById('toast'); e.textContent=t; e.classList.add('on'); setTimeout(function(){e.classList.remove('on');},2200); }
function api(path,opts){ return fetch(path,opts); }

/* ---------------- theme ---------------- */
document.getElementById('tgl').onclick=function(){ var r=document.documentElement; r.setAttribute('data-theme', r.getAttribute('data-theme')==='dark'?'light':'dark'); };

/* ---------------- breadcrumb ---------------- */
function renderCrumbs(){
  var c=document.getElementById('crumbar'); var html='';
  var segs = currentPath.split('/').filter(Boolean);
  html += '<a href="/files?path=%2F">SD</a>';
  var acc='';
  segs.forEach(function(s,i){
    acc += '/' + s;
    html += '<span>/</span>';
    if(i===segs.length-1) html += '<b>'+esc(s)+'</b>';
    else html += '<a href="/files?path='+encodeURIComponent(acc)+'">'+esc(s)+'</a>';
  });
  html += '<span class="sp">'
    + '<button class="kbtn" onclick="openFolder()">+ New folder</button>'
    + '<button class="kbtn" onclick="openUpload()">↑ Upload</button>'
    + '<button class="kbtn" onclick="openMoveFavorites()">★ Favorites</button>'
    + '</span>';
  c.innerHTML = html;
}

/* ---------------- listing ---------------- */
function hydrate(){
  renderCrumbs();
  api('/api/status').then(function(r){return r.json();}).then(function(s){
    document.getElementById('devChip').textContent = (s.device||'Reader') + (s.version?(' · v'+s.version):'');
  }).catch(function(){ document.getElementById('devChip').textContent=''; });

  api('/api/files?path='+encodeURIComponent(currentPath)+'&_='+Date.now())
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(function(list){
      entries = list.slice().sort(function(a,b){
        if(a.isDirectory!==b.isDirectory) return a.isDirectory?-1:1;
        if(a.isEpub!==b.isEpub) return a.isEpub?-1:1;
        return a.name.localeCompare(b.name);
      });
      renderRows();
    })
    .catch(function(){ document.getElementById('rows').innerHTML='<tr><td colspan="5" class="empty">Could not load this folder.</td></tr>'; });
}

function renderRows(){
  var tb=document.getElementById('rows');
  if(!entries.length){ tb.innerHTML='<tr><td colspan="5" class="empty">Empty folder.</td></tr>'; document.getElementById('foot').textContent=''; updateSel(); return; }
  var html=''; var folders=0, files=0, bytes=0;
  entries.forEach(function(e,idx){
    var full=joinPath(currentPath,e.name);
    var encFull=encodeURIComponent(full);
    if(e.isDirectory){ folders++; } else { files++; bytes+=e.size||0; }
    var nameCell, kind, size, acts;
    if(e.isDirectory){
      nameCell='<a href="/files?path='+encFull+'"><span class="tri">▸</span>'+esc(e.name)+'</a>';
      kind='Folder'; size=(e.size||'')+''; size='—';
      acts='<button title="Rename" onclick="openRename('+idx+')">✎</button>'
          +'<button title="Move" onclick="openMoveOne('+idx+')">⇄</button>'
          +'<button title="Delete" onclick="openDeleteOne('+idx+')">✕</button>';
    } else {
      var fav = favMatch(e.name) ? '<span class="fav" title="Favorite wallpaper">★</span>' : '';
      nameCell='<a href="/download?path='+encFull+'" target="_blank">'+esc(e.name)+'</a>'+fav;
      kind=e.isEpub?'EPUB':(ext(e.name)||'FILE'); size=fmtSize(e.size||0);
      acts='<button title="Download" onclick="window.open(\'/download?path='+encFull+'\')">↓</button>'
          +'<button title="Rename" onclick="openRename('+idx+')">✎</button>'
          +'<button title="Move" onclick="openMoveOne('+idx+')">⇄</button>'
          +'<button title="Delete" onclick="openDeleteOne('+idx+')">✕</button>';
    }
    html+='<tr data-idx="'+idx+'">'
      +'<td class="c"><input type="checkbox" class="ck" data-idx="'+idx+'" onclick="onCheck(this)"></td>'
      +'<td class="nm '+(e.isDirectory?'fold':'')+'">'+nameCell+'</td>'
      +'<td class="k">'+kind+'</td>'
      +'<td class="sz r">'+(e.isDirectory?'—':fmtSize(e.size||0))+'</td>'
      +'<td class="acts">'+acts+'</td>'
      +'</tr>';
  });
  tb.innerHTML=html;
  document.getElementById('foot').textContent = files+' file'+(files!==1?'s':'')+' · '+folders+' folder'+(folders!==1?'s':'')+' · '+fmtSize(bytes)+' in files';
  updateSel();
}

/* ---------------- selection ---------------- */
function selectedIdx(){ return Array.prototype.slice.call(document.querySelectorAll('.ck:checked')).map(function(c){return +c.dataset.idx;}); }
function onCheck(cb){ cb.closest('tr').classList.toggle('sel', cb.checked); updateSel(); }
function toggleAll(cb){ document.querySelectorAll('.ck').forEach(function(c){ c.checked=cb.checked; c.closest('tr').classList.toggle('sel',cb.checked); }); updateSel(); }
function clearSel(){ document.getElementById('all').checked=false; toggleAll(document.getElementById('all')); }
function updateSel(){
  var sel=selectedIdx();
  var bar=document.getElementById('selbar');
  bar.hidden = sel.length===0;
  document.getElementById('selCount').textContent = sel.length+' selected';
}

/* ---------------- new folder ---------------- */
function openFolder(){ document.getElementById('folderName').value=''; document.getElementById('folderMsg').textContent=''; openM('m-folder'); setTimeout(function(){document.getElementById('folderName').focus();},50); }
function createFolder(){
  var name=document.getElementById('folderName').value.trim();
  if(!/^(?!\.{1,2}$)[^"*:<>?\/\\|]+$/.test(name)){ document.getElementById('folderMsg').textContent='Invalid name.'; return; }
  var fd=new FormData(); fd.append('name',name); fd.append('path',currentPath);
  api('/mkdir',{method:'POST',body:fd}).then(function(r){ if(r.ok) location.reload(); else r.text().then(function(t){document.getElementById('folderMsg').textContent=t||'Failed.';}); });
}

/* ---------------- rename (files + folders) ---------------- */
var renameIdx=-1;
function openRename(idx){ renameIdx=idx; var e=entries[idx]; document.getElementById('renameTitle').textContent='Rename '+(e.isDirectory?'folder':'file'); document.getElementById('renameName').value=e.name; document.getElementById('renameMsg').textContent=''; openM('m-rename'); var inp=document.getElementById('renameName'); setTimeout(function(){inp.focus();inp.select();},50); }
function confirmRename(){
  var e=entries[renameIdx]; var name=document.getElementById('renameName').value.trim();
  if(!name || name.indexOf('/')>=0 || name.indexOf('\\')>=0){ document.getElementById('renameMsg').textContent='Invalid name.'; return; }
  var fd=new FormData(); fd.append('path',joinPath(currentPath,e.name)); fd.append('name',name);
  api('/rename',{method:'POST',body:fd}).then(function(r){ if(r.ok) location.reload(); else r.text().then(function(t){document.getElementById('renameMsg').textContent=t||'Failed.';}); });
}

/* ---------------- move (files + folders, single + multi) ---------------- */
function openMoveOne(idx){ var e=entries[idx]; moveCtx={paths:[joinPath(currentPath,e.name)], single:true, name:e.name}; startMove(); }
function openMove(){ var sel=selectedIdx(); if(!sel.length) return; moveCtx={paths:sel.map(function(i){return joinPath(currentPath,entries[i].name);}), single:sel.length===1, name:sel.length+' items'}; startMove(); }
function startMove(){
  document.getElementById('moveTitle').textContent='Move '+moveCtx.name+' to…';
  document.getElementById('moveDest').value='';
  document.getElementById('moveMsg').textContent='';
  var picks=document.getElementById('movePicks'); picks.innerHTML='<button onclick="pickDest(\'/\')">/ (SD root)</button>';
  var par=parentOf(currentPath); if(par!==currentPath) picks.innerHTML+='<button onclick="pickDest(\''+par+'\')">'+esc(par)+' (up)</button>';
  entries.forEach(function(e){ if(e.isDirectory){ var d=joinPath(currentPath,e.name); picks.innerHTML+='<button onclick="pickDest(\''+d.replace(/'/g,"\\'")+'\')">'+esc(d)+'</button>'; } });
  openM('m-move');
}
function pickDest(d){ document.getElementById('moveDest').value=d; document.querySelectorAll('#movePicks button').forEach(function(b){b.classList.remove('on');}); }
function confirmMove(){
  var dest=document.getElementById('moveDest').value.trim(); if(dest && dest[0]!=='/') dest='/'+dest;
  if(!dest){ document.getElementById('moveMsg').textContent='Choose a destination.'; return; }
  if(moveCtx.paths.length===1){
    var fd=new FormData(); fd.append('path',moveCtx.paths[0]); fd.append('dest',dest);
    api('/move',{method:'POST',body:fd}).then(function(r){ if(r.ok) location.reload(); else r.text().then(function(t){document.getElementById('moveMsg').textContent=t||'Failed.';}); });
  } else {
    var body='dest='+encodeURIComponent(dest)+'&paths='+encodeURIComponent(JSON.stringify(moveCtx.paths));
    api('/movebatch',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body})
      .then(function(r){return r.json().catch(function(){return{};}).then(function(j){return{ok:r.ok,j:j};});})
      .then(function(o){ if(o.ok){ toast('Moved '+(o.j.moved||0)+', failed '+(o.j.failed||0)); setTimeout(function(){location.reload();},700);} else document.getElementById('moveMsg').textContent='Failed.'; });
  }
}

/* ---------------- delete (recursive folders via backend) ---------------- */
function openDeleteOne(idx){ var e=entries[idx]; deleteCtx={paths:[joinPath(currentPath,e.name)], isDir:e.isDirectory, label:e.name}; startDelete(); }
function openDelete(){ var sel=selectedIdx(); if(!sel.length) return; deleteCtx={paths:sel.map(function(i){return joinPath(currentPath,entries[i].name);}), isDir:false, label:sel.length+' items'}; startDelete(); }
function startDelete(){
  var w=document.getElementById('deleteWarn'); document.getElementById('deleteMsg').textContent='';
  if(deleteCtx.paths.length===1 && deleteCtx.isDir){
    w.innerHTML='Counting…';
    api('/api/dircount?path='+encodeURIComponent(deleteCtx.paths[0])).then(function(r){return r.json();}).then(function(c){
      w.innerHTML='Delete folder <b>'+esc(deleteCtx.label)+'</b> and everything inside — <b>'+c.files+(c.capped?'+':'')+' files</b> in '+c.dirs+' subfolders. This cannot be undone.';
    }).catch(function(){ w.innerHTML='Delete folder <b>'+esc(deleteCtx.label)+'</b> and everything inside. This cannot be undone.'; });
  } else {
    w.innerHTML='Delete <b>'+esc(deleteCtx.label)+'</b>. This cannot be undone.';
  }
  openM('m-delete');
}
function confirmDelete(){
  var paths=deleteCtx.paths.map(function(p){ return p[0]==='/'?p:'/'+p; });
  var body='paths='+encodeURIComponent(JSON.stringify(paths));
  document.getElementById('deleteGo').disabled=true;
  api('/delete',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body})
    .then(function(r){ if(r.ok) location.reload(); else r.text().then(function(t){document.getElementById('deleteGo').disabled=false;document.getElementById('deleteMsg').textContent=t||'Failed.';}); });
}
function downloadSelected(){ selectedIdx().forEach(function(i){ var e=entries[i]; if(!e.isDirectory) window.open('/download?path='+encodeURIComponent(joinPath(currentPath,e.name))); }); }

/* ---------------- move favorites (wallpaper _F files -> /sleep) ---------------- */
function favPaths(){ return entries.filter(function(e){return !e.isDirectory && favMatch(e.name);}).map(function(e){return joinPath(currentPath,e.name);}); }
function openMoveFavorites(){
  var fp=favPaths();
  document.getElementById('favInfo').textContent = fp.length ? (fp.length+' favorite wallpaper file'+(fp.length!==1?'s':'')+' in this folder.') : 'No favorite (_F) wallpaper files in this folder.';
  document.getElementById('favDest').value = currentPath.indexOf('/sleep')===0 ? '/sleep pause' : '/sleep';
  document.getElementById('favMsg').textContent='';
  document.getElementById('favGo').disabled = fp.length===0;
  openM('m-fav');
}
function confirmMoveFavorites(){
  var fp=favPaths(); var dest=document.getElementById('favDest').value.trim(); if(dest[0]!=='/')dest='/'+dest;
  var moved=0, failed=0, i=0;
  document.getElementById('favGo').disabled=true;
  function chunk(){
    if(i>=fp.length){ toast('Moved '+moved+', failed '+failed); setTimeout(function(){location.reload();},700); return; }
    var batch=fp.slice(i,i+25); i+=25;
    var body='dest='+encodeURIComponent(dest)+'&paths='+encodeURIComponent(JSON.stringify(batch));
    document.getElementById('favMsg').textContent='Moving '+Math.min(i,fp.length)+' / '+fp.length+'…';
    api('/movebatch',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body})
      .then(function(r){return r.json().catch(function(){return{};});})
      .then(function(j){ moved+=(j.moved||0); failed+=(j.failed||0); chunk(); })
      .catch(function(){ failed+=batch.length; chunk(); });
  }
  chunk();
}

/* ---------------- upload (WS fast path + HTTP fallback, ported) ---------------- */
function getWsUrl(){ return 'ws://'+window.location.hostname+':'+WS_PORT+'/'; }
function uploadFileWebSocket(file,onProgress){
  return new Promise(function(resolve,reject){
    var ws=new WebSocket(getWsUrl()); currentUploadWs=ws;
    var uploadStarted=false, sendingChunks=false, uploadComplete=false;
    ws.binaryType='arraybuffer';
    ws.onopen=function(){ ws.send('START:'+file.name+':'+file.size+':'+currentPath); };
    ws.onmessage=async function(ev){
      var msg=ev.data;
      if(msg==='READY'){
        uploadStarted=true; sendingChunks=true;
        await new Promise(function(r){setTimeout(r,50);});
        try{
          var total=file.size, offset=0;
          while(offset<total && ws.readyState===WebSocket.OPEN){
            var cs=Math.min(WS_CHUNK_SIZE,total-offset);
            var buf=await file.slice(offset,offset+cs).arrayBuffer();
            while(ws.bufferedAmount>WS_CHUNK_SIZE*2 && ws.readyState===WebSocket.OPEN){ await new Promise(function(r){setTimeout(r,5);}); }
            if(ws.readyState!==WebSocket.OPEN) throw new Error('WebSocket closed during upload');
            ws.send(buf); offset+=cs; if(onProgress) onProgress(offset,total);
          }
          sendingChunks=false;
        }catch(err){ sendingChunks=false; ws.close(); reject(err); }
      } else if(msg.indexOf('PROGRESS:')===0){ /* ignore, local progress is smoother */ }
      else if(msg==='DONE'){ if(onProgress) onProgress(file.size,file.size); uploadComplete=true; currentUploadWs=null; ws.close(); resolve(); }
      else if(msg.indexOf('ERROR:')===0){ ws.close(); reject(new Error(msg.substring(6))); }
    };
    ws.onerror=function(){ currentUploadWs=null; reject(new Error('WebSocket connection failed')); };
    ws.onclose=function(){ if(!uploadComplete) reject(new Error('WebSocket closed during upload')); };
  });
}
function uploadFileHTTP(file,onProgress){
  return new Promise(function(resolve,reject){
    var fd=new FormData(); fd.append('file',file);
    var xhr=new XMLHttpRequest(); currentUploadXhr=xhr;
    xhr.open('POST','/upload?path='+encodeURIComponent(currentPath),true);
    xhr.upload.onprogress=function(e){ if(e.lengthComputable && onProgress) onProgress(e.loaded,e.total); };
    xhr.onload=function(){ currentUploadXhr=null; if(xhr.status===200) resolve(); else reject(new Error(xhr.responseText||'Upload failed')); };
    xhr.onerror=function(){ currentUploadXhr=null; reject(new Error('Network error')); };
    xhr.send(fd);
  });
}

var wsWorks=true;
function openUpload(){
  document.getElementById('upPath').textContent=currentPath;
  document.getElementById('upList').innerHTML=''; document.getElementById('upMsg').textContent='';
  document.getElementById('fileIn').value=''; document.getElementById('upGo').disabled=true;
  uploadQueue=[]; openM('m-upload');
}
function closeUpload(){ if(uploadBusy) return; closeM('m-upload'); }
function setQueue(files){
  uploadQueue=Array.prototype.slice.call(files);
  var host=document.getElementById('upList'); host.innerHTML='';
  uploadQueue.forEach(function(f,i){
    var row=document.createElement('div'); row.className='uprow'; row.id='up-'+i;
    row.innerHTML='<div style="flex:1;min-width:0"><div class="nm">'+esc(f.name)+'</div><div class="bar"><i></i></div></div><div class="st">'+fmtSize(f.size)+'</div>';
    host.appendChild(row);
  });
  document.getElementById('upGo').disabled = uploadQueue.length===0;
}
function rowProg(i,pct){ var r=document.getElementById('up-'+i); if(r) r.querySelector('.bar>i').style.width=pct+'%'; }
function rowState(i,txt){ var r=document.getElementById('up-'+i); if(r) r.querySelector('.st').textContent=txt; }
async function startUpload(){
  if(!uploadQueue.length||uploadBusy) return;
  uploadBusy=true; var gen=++uploadGen;
  document.getElementById('upGo').disabled=true; document.getElementById('upClose').disabled=true;
  var failures=0;
  for(var i=0;i<uploadQueue.length;i++){
    if(gen!==uploadGen) break;
    var f=uploadQueue[i];
    try{
      if(wsWorks){
        try{ await uploadFileWebSocket(f,function(a,b){rowProg(i,Math.round(a*100/b));}); }
        catch(e){ if(/connection failed/i.test(e.message)){ wsWorks=false; await uploadFileHTTP(f,function(a,b){rowProg(i,Math.round(a*100/b));}); } else throw e; }
      } else {
        await uploadFileHTTP(f,function(a,b){rowProg(i,Math.round(a*100/b));});
      }
      rowProg(i,100); rowState(i,'done');
    }catch(e){ failures++; rowState(i,'failed'); }
  }
  uploadBusy=false; document.getElementById('upClose').disabled=false;
  if(failures===0){ document.getElementById('upMsg').textContent='All uploaded. Refreshing…'; setTimeout(function(){location.reload();},600); }
  else { document.getElementById('upMsg').className='msg err'; document.getElementById('upMsg').textContent=failures+' file(s) failed. Close and retry.'; document.getElementById('upGo').disabled=false; }
}
(function(){
  var drop=document.getElementById('drop'), inp=document.getElementById('fileIn');
  drop.onclick=function(){ if(!uploadBusy) inp.click(); };
  inp.onchange=function(){ setQueue(inp.files); };
  ['dragenter','dragover'].forEach(function(ev){ drop.addEventListener(ev,function(e){ e.preventDefault(); if(!uploadBusy) drop.classList.add('hot'); }); });
  ['dragleave','drop'].forEach(function(ev){ drop.addEventListener(ev,function(e){ e.preventDefault(); drop.classList.remove('hot'); }); });
  drop.addEventListener('drop',function(e){ if(uploadBusy) return; if(e.dataTransfer && e.dataTransfer.files.length) setQueue(e.dataTransfer.files); });
})();

/* close modal on scrim click */
document.querySelectorAll('.scrim').forEach(function(s){ s.addEventListener('click',function(e){ if(e.target===s && !(s.id==='m-upload'&&uploadBusy)) s.classList.remove('on'); }); });

hydrate();
</script>
