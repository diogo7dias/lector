name: Compile Release
on:
  push:
    tags:
      - '*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Build CrossPoint
        run: pio run -e gh_release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CrossPoint-${{ github.ref_name }}
          path: |
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/firmware.elf
            .pio/build/gh_release/firmware.map
            .pio/build/gh_release/partitions.bin

      # Attaches the firmware binaries to a GitHub Release for the tag so users
      # who flash manually (esptool) can download them without the browser
      # flasher. Creates the release if the tag has none, otherwise uploads the
      # assets onto the existing one.
      - name: Publish GitHub release with firmware assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          BUILD_DIR=.pio/build/gh_release
          for f in firmware.bin bootloader.bin partitions.bin firmware.elf; do
            test -f "$BUILD_DIR/$f" || { echo "missing $BUILD_DIR/$f" >&2; exit 1; }
          done
          ASSETS=("$BUILD_DIR/firmware.bin" "$BUILD_DIR/bootloader.bin" "$BUILD_DIR/partitions.bin" "$BUILD_DIR/firmware.elf")
          BOOT_APP0="$(find "$HOME/.platformio/packages" -path '*/tools/partitions/boot_app0.bin' | head -n1)"
          if [ -n "$BOOT_APP0" ]; then
            cp "$BOOT_APP0" "$BUILD_DIR/boot_app0.bin"
            ASSETS+=("$BUILD_DIR/boot_app0.bin")
          fi
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<'EOF'
          **Easiest install:** use the [browser flasher](https://diogo7dias.github.io/lector-wallpaper-converter/#flash) (Chrome/Edge, USB cable). One build serves both Xteink X3 and X4.

          **Manual flash (esptool):**
          ```
          esptool.py --chip esp32c3 write_flash \
            0x0 bootloader.bin \
            0x8000 partitions.bin \
            0xE000 boot_app0.bin \
            0x10000 firmware.bin
          ```
          `firmware.elf` is for symbolizing crash reports, not for flashing.

          ---
          EOF
          PRERELEASE_FLAG=""
          case "$TAG" in *rc*|*RC*) PRERELEASE_FLAG="--prerelease" ;; esac
          if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" \
              --title "Lector $TAG" \
              --notes-file "$NOTES_FILE" \
              --generate-notes \
              $PRERELEASE_FLAG
          fi

      # Publishes the freshly built binaries into the wallpaper site so its
      # /flash page can serve the latest build to the browser flasher.
      # Stable tags only (skips *-rc*). Needs a fine-grained PAT with
      # Contents:write on lector-wallpaper-converter, stored as WALLPAPER_REPO_TOKEN.
      - name: Publish firmware to flasher site
        if: ${{ !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'RC') }}
        env:
          WALLPAPER_TOKEN: ${{ secrets.WALLPAPER_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${WALLPAPER_TOKEN:-}" ]; then
            echo "WALLPAPER_REPO_TOKEN is not set; skipping flasher publish." >&2
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_DIR=.pio/build/gh_release
          BOOT_APP0="$(find "$HOME/.platformio/packages" -path '*/tools/partitions/boot_app0.bin' | head -n1)"
          if [ -z "$BOOT_APP0" ]; then
            echo "boot_app0.bin not found in the framework package." >&2
            exit 1
          fi
          for f in firmware.bin bootloader.bin partitions.bin; do
            test -f "$BUILD_DIR/$f" || { echo "missing $BUILD_DIR/$f" >&2; exit 1; }
          done
          git clone --depth 1 \
            "https://x-access-token:${WALLPAPER_TOKEN}@github.com/diogo7dias/lector-wallpaper-converter.git" site
          DEST=site/flash/firmware/latest
          mkdir -p "$DEST"
          cp "$BUILD_DIR/firmware.bin" "$BUILD_DIR/bootloader.bin" "$BUILD_DIR/partitions.bin" "$DEST/"
          cp "$BOOT_APP0" "$DEST/boot_app0.bin"
          printf '%s\n' "$VERSION" > site/flash/version.txt
          python3 - "$VERSION" <<'PY'
          import json, sys
          version = sys.argv[1]
          for path in ("site/flash/manifest-update.json", "site/flash/manifest-full.json"):
              with open(path) as fh:
                  data = json.load(fh)
              data["version"] = version
              with open(path, "w") as fh:
                  json.dump(data, fh, indent=2)
                  fh.write("\n")
          PY
          cd site
          git config user.name "lector-release-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flash/firmware/latest flash/version.txt flash/manifest-update.json flash/manifest-full.json
          if git diff --cached --quiet; then
            echo "No firmware changes to publish."
          else
            git commit -m "chore(flash): publish Lector v${VERSION} firmware"
            git push
          fi

      # A PAT push to the wallpaper repo does not reliably trigger its (legacy,
      # branch-based) GitHub Pages rebuild, so the /flash site can keep serving the
      # previous version.txt until forced. Request a build explicitly. Needs the PAT
      # to also have Pages:write on lector-wallpaper-converter; if it does not, this
      # warns (does not fail the release) and the build can be triggered by hand with
      # `gh api -X POST repos/diogo7dias/lector-wallpaper-converter/pages/builds`.
      - name: Trigger flasher site Pages rebuild
        if: ${{ !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'RC') }}
        env:
          WALLPAPER_TOKEN: ${{ secrets.WALLPAPER_REPO_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${WALLPAPER_TOKEN:-}" ]; then
            echo "WALLPAPER_REPO_TOKEN is not set; skipping Pages rebuild." >&2
            exit 0
          fi
          code="$(curl -sS -o /tmp/pages_resp.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${WALLPAPER_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/diogo7dias/lector-wallpaper-converter/pages/builds || echo 000)"
          echo "Pages build request HTTP ${code}"
          if [ "${code}" = "201" ]; then
            echo "GitHub Pages rebuild requested; the /flash site will show v${GITHUB_REF_NAME#v} shortly."
          else
            echo "::warning::Pages rebuild request returned HTTP ${code}. WALLPAPER_REPO_TOKEN likely lacks Pages:write on lector-wallpaper-converter. Grant it, or run: gh api -X POST repos/diogo7dias/lector-wallpaper-converter/pages/builds"
            cat /tmp/pages_resp.json 2>/dev/null || true
          fi
